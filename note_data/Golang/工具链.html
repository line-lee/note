<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go工具链参考</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Roboto,system-ui;background:#f8fafc;padding:32px;}
        .toolchain-section{max-width:1400px;margin:0 auto;}
        .toolchain-card{background:#fff;border-radius:28px;overflow-x:auto;border:1px solid #eef2f8;}
        .toolchain-title{font-size:1.45rem;font-weight:600;padding:20px 24px 12px;border-bottom:2px solid #eef2f8;display:flex;align-items:center;gap:12px;}
        .toolchain-title span{background:#e9f0f5;font-size:.75rem;padding:4px 12px;border-radius:40px;color:#006688;}
        table{width:100%;border-collapse:collapse;font-size:.88rem;}
        th{text-align:left;padding:14px 20px;background:#fafcff;font-weight:600;color:#1f4b5e;border-bottom:1px solid #e6edf4;}
        td{padding:12px 20px;border-bottom:1px solid #eff3f9;vertical-align:top;}
        .tool-name{font-family:'Fira Code',monospace;font-weight:600;background:#eefaf3;border-radius:8px;padding:2px 8px;font-size:.82rem;display:inline-block;color:#1f6e43;}
        code{background:#f1f5f9;padding:2px 6px;border-radius:8px;font-family:monospace;font-size:.8rem;}
    </style>
</head>
<body>
<div class="toolchain-section">
    <div class="toolchain-card">
        <div class="toolchain-title">🔨 Go工具链 <span>位于 $GOTOOLDIR</span></div>
        <div id="toolchain-table"></div>
    </div>
</div>

<script>
    const toolchainData = [
        {name:"compile", role:"Go编译器核心", invoked:"go build"},
        {name:"link", role:"链接器", invoked:"go build"},
        {name:"asm", role:"汇编器", invoked:"compile内部"},
        {name:"vet", role:"静态分析", invoked:"go vet"},
        {name:"cover", role:"代码覆盖率", invoked:"go test -cover"},
        {name:"trace", role:"执行追踪", invoked:"go tool trace"},
        {name:"pprof", role:"性能剖析", invoked:"go tool pprof"},
        {name:"nm", role:"显示符号表", invoked:"go tool nm"},
        {name:"objdump", role:"反汇编", invoked:"go tool objdump"},
        {name:"addr2line", role:"地址转行号", invoked:"调试"},
        {name:"pack", role:"归档文件", invoked:"compile间接"},
        {name:"cgo", role:"CGO包装", invoked:"go build"},
        {name:"dist", role:"发行版构建", invoked:"make.bash"},
        {name:"test2json", role:"测试转JSON", invoked:"go test -json"},
        {name:"buildid", role:"构建ID", invoked:"内部"},
        {name:"doc", role:"文档查看", invoked:"go doc"}
    ];

    function renderToolchain() {
        const container = document.getElementById('toolchain-table');
        if(!container) return;

        let html = '<table><thead><tr><th>工具名</th><th>角色/功能</th><th>通常被调用场景</th></tr></thead><tbody>';
        for (const item of toolchainData) {
            html += `<tr>
                <td><span class="tool-name">${item.name}</span></td>
                <td>${item.role}</td>
                <td><code>${item.invoked}</code></td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    renderToolchain();
</script>
</body>
</html>

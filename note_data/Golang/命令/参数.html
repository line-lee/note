<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go参数参考</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Roboto,system-ui;background:#f8fafc;padding:32px;}
    .flags-section{max-width:1400px;margin:0 auto;}
    .flags-card{background:#fff;border-radius:28px;overflow-x:auto;border:1px solid #eef2f8;}
    .flags-title{font-size:1.45rem;font-weight:600;padding:20px 24px 12px;border-bottom:2px solid #eef2f8;display:flex;align-items:center;gap:12px;}
    .flags-title span{background:#e9f0f5;font-size:.75rem;padding:4px 12px;border-radius:40px;color:#006688;}
    table{width:100%;border-collapse:collapse;font-size:.88rem;}
    th{text-align:left;padding:14px 20px;background:#fafcff;font-weight:600;color:#1f4b5e;border-bottom:1px solid #e6edf4;}
    td{padding:12px 20px;border-bottom:1px solid #eff3f9;vertical-align:top;}
    .flag-name{font-family:'Fira Code',monospace;font-weight:600;background:#fef6f9;border-radius:8px;padding:2px 8px;font-size:.82rem;display:inline-block;color:#c7254e;}
    code{background:#f1f5f9;padding:2px 6px;border-radius:8px;font-family:monospace;font-size:.8rem;}
  </style>
</head>
<body>
<div class="flags-section">
  <div class="flags-card">
    <div class="flags-title">🏳️ 常用Go参数 <span>通用标志</span></div>
    <div id="flags-table"></div>
  </div>
</div>

<script>
  const flagsData = [
    {flag:"-v", commands:"build,test", desc:"详细日志"},
    {flag:"-x", commands:"build,test", desc:"打印执行的命令"},
    {flag:"-o", commands:"build", desc:"指定输出文件名", placeholder:"<file>"},
    {flag:"-race", commands:"build,test", desc:"启用数据竞争检测"},
    {flag:"-cover", commands:"test", desc:"显示代码覆盖率"},
    {flag:"-coverprofile", commands:"test", desc:"输出覆盖率文件"},
    {flag:"-mod", commands:"build,test", desc:"模块模式 (readonly/vendor/mod)", placeholder:"<mode>"},
    {flag:"-ldflags", commands:"build", desc:"链接器参数"},
    {flag:"-tags", commands:"build,test", desc:"构建标签"},
    {flag:"-run", commands:"test", desc:"运行匹配的测试", placeholder:"<regexp>"},
    {flag:"-bench", commands:"test", desc:"运行基准测试"},
    {flag:"-count", commands:"test", desc:"运行测试次数", placeholder:"<n>"},
    {flag:"-json", commands:"test", desc:"JSON格式输出"},
    {flag:"-work", commands:"build,test", desc:"保留临时工作目录"},
    {flag:"-trimpath", commands:"build", desc:"移除文件系统路径"},
    {flag:"-gcflags", commands:"build", desc:"编译器参数"}
  ];

  function renderFlags() {
    const container = document.getElementById('flags-table');
    if(!container) return;

    let html = '<table><thead><tr><th>参数/标志</th><th>适用命令</th><th>说明</th></tr></thead><tbody>';
    for (const item of flagsData) {
      const displayFlag = item.flag + (item.placeholder ? ' ' + item.placeholder : '');
      html += `<tr>
                <td><span class="flag-name">${displayFlag}</span></td>
                <td><code>go ${item.commands}</code></td>
                <td>${item.desc}</td>
            </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  renderFlags();
</script>
</body>
</html>

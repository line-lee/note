<div class="commands-section">
  <style>
    .commands-section{font-family:'Segoe UI',Roboto,system-ui;background:#f8fafc;}
    .commands-card{background:#fff;border-radius:28px;overflow-x:auto;border:1px solid #eef2f8;}
    .commands-title{font-size:1.45rem;font-weight:600;padding:20px 24px 12px;border-bottom:2px solid #eef2f8;display:flex;align-items:center;gap:12px;}
    .commands-title span{background:#e9f0f5;font-size:.75rem;padding:4px 12px;border-radius:40px;color:#006688;}
    table{width:100%;border-collapse:collapse;font-size:.88rem;}
    th{text-align:left;padding:14px 20px;background:#fafcff;font-weight:600;color:#1f4b5e;border-bottom:1px solid #e6edf4;}
    td{padding:12px 20px;border-bottom:1px solid #eff3f9;vertical-align:top;}
    .cmd-name{font-family:'Fira Code',monospace;font-weight:600;background:#eefaf3;border-radius:8px;padding:2px 8px;font-size:.82rem;display:inline-block;color:#1f6e43;}
    .notes-toggle{background:none;border:none;font-size:1rem;cursor:pointer;padding:2px 8px;border-radius:20px;color:#a47c48;font-weight:bold;}
    .notes-toggle:hover{background:#f0e6d8;}
    .notes-count{font-size:.65rem;background:#f5e6d3;border-radius:30px;padding:2px 6px;color:#b87c3a;margin-left:6px;}
    .notes-expand-row{background:#fefaf5;}
    .notes-expand-cell{padding:12px 20px!important;background:#fefaf5;}
    .note-item{background:#fffaf0;border-radius:12px;padding:10px 12px;margin:8px 0;border:1px solid #f0e2cf;}
    .note-line{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
    .note-time-badge{font-size:.7rem;color:#b2894b;background:#f7efe3;padding:2px 8px;border-radius:20px;white-space:nowrap;}
    .note-content-text{flex:1;color:#5e3a1f;word-break:break-word;white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.85rem;line-height:1.6;}
    .empty-notes-msg{font-size:.7rem;color:#b0a088;font-style:italic;padding:8px 0;}
    .field-container{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    code{background:#f1f5f9;padding:2px 6px;border-radius:8px;font-family:monospace;font-size:.8rem;}
    .footnote{font-size:.75rem;color:#6a7f94;margin-top:20px;text-align:center;padding-top:18px;}
  </style>
  <div class="commands-card">
    <div class="commands-title">📋 常用Go命令 <span>go command</span></div>
    <div id="commands-table"></div>
  </div>
  <div class="footnote">📖 点击命令旁的「>」展开查看笔记</div>
</div>

<script>
  (function(){
    const notesData = {
      "cmd_go mod": [{"content": "使用 go mod tidy 清理无用依赖，go mod vendor 可将依赖复制到vendor目录", "time": "2025-01-17 09:15:44"}],
      "cmd_go build": [{"content": "-o 指定输出文件名，-ldflags 可在编译时注入变量", "time": "2026-03-27 15:40:00"}],
      "cmd_go test": [{"content": "-v 显示详细信息，-run 正则匹配测试函数，-bench 运行基准测试", "time": "2026-03-27 15:42:00"}]
    };

    function getNoteList(key) { return notesData[key] || []; }
    let expandStates = {};

    function renderFullWidthNotesPanel(key) {
      const notes = getNoteList(key);
      const container = document.createElement('div');
      if(notes.length===0){
        const empty=document.createElement('div');
        empty.className='empty-notes-msg';
        empty.textContent='📭 暂无笔记';
        container.appendChild(empty);
      } else {
        notes.forEach((note)=>{
          const div=document.createElement('div');
          div.className='note-item';
          const line=document.createElement('div');
          line.className='note-line';
          const timeSpan=document.createElement('span');
          timeSpan.className='note-time-badge';
          timeSpan.innerHTML=`📅 ${note.time}`;
          const contentSpan=document.createElement('span');
          contentSpan.className='note-content-text';
          contentSpan.innerHTML = note.content;
          line.appendChild(timeSpan);
          line.appendChild(contentSpan);
          div.appendChild(line);
          container.appendChild(div);
        });
      }
      return container;
    }

    function createFieldWithToggle(cmdName, key, noteCount, isExpanded, onToggle){
      const wrap=document.createElement('div');
      wrap.className='field-container';
      const nameSpan=document.createElement('span');
      nameSpan.className='cmd-name';
      nameSpan.textContent=cmdName;
      const toggleBtn=document.createElement('button');
      toggleBtn.className='notes-toggle';
      toggleBtn.innerHTML=isExpanded?'✔':'>';
      const countSpan=document.createElement('span');
      countSpan.className='notes-count';
      countSpan.textContent=`${noteCount}`;
      wrap.appendChild(nameSpan);
      wrap.appendChild(toggleBtn);
      if(noteCount>0) wrap.appendChild(countSpan);
      toggleBtn.onclick=onToggle;
      return wrap;
    }

    function renderTable() {
      const data = [
        {name:"go build",desc:"编译包和依赖",example:"go build ./cmd/app"},{name:"go install",desc:"编译并安装",example:"go install tool@latest"},
        {name:"go run",desc:"编译并运行",example:"go run main.go"},{name:"go test",desc:"运行测试",example:"go test -v ./..."},
        {name:"go get",desc:"添加依赖",example:"go get -u pkg"},{name:"go mod",desc:"模块维护",example:"go mod tidy"},
        {name:"go vet",desc:"静态检查",example:"go vet ./..."},{name:"go fmt",desc:"格式化",example:"go fmt ./..."},
        {name:"go generate",desc:"生成代码",example:"go generate ./..."},{name:"go clean",desc:"清理文件",example:"go clean -cache"},
        {name:"go env",desc:"环境信息",example:"go env GOROOT"},{name:"go list",desc:"列出包",example:"go list -m all"},
        {name:"go work",desc:"工作区管理",example:"go work init"},{name:"go tool",desc:"运行工具链",example:"go tool compile -help"}
      ];
      const c = document.getElementById('commands-table');
      if(!c) return;
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const header = document.createElement('tr');
      ['命令', '用途', '示例'].forEach(col=>{ const th=document.createElement('th'); th.textContent=col; header.appendChild(th); });
      thead.appendChild(header);
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      data.forEach(item => {
        const key = `cmd_${item.name}`;
        const noteCount = getNoteList(key).length;
        const isExpanded = expandStates[key] || false;
        const mainRow = document.createElement('tr');

        const td1 = document.createElement('td');
        const btnWrap = createFieldWithToggle(item.name, key, noteCount, isExpanded, () => {
          expandStates[key] = !expandStates[key];
          renderTable();
        });
        td1.appendChild(btnWrap);
        mainRow.appendChild(td1);

        const td2 = document.createElement('td');
        td2.innerHTML = `<span style="font-weight:500;">${item.desc}</span>`;
        mainRow.appendChild(td2);

        const td3 = document.createElement('td');
        td3.innerHTML = `<code>${item.example}</code>`;
        mainRow.appendChild(td3);

        tbody.appendChild(mainRow);

        if(isExpanded){
          const expandRow = document.createElement('tr');
          expandRow.className = 'notes-expand-row';
          const expandCell = document.createElement('td');
          expandCell.colSpan = 3;
          expandCell.className = 'notes-expand-cell';
          expandCell.appendChild(renderFullWidthNotesPanel(key));
          expandRow.appendChild(expandCell);
          tbody.appendChild(expandRow);
        }
      });
      table.appendChild(tbody);
      c.innerHTML = '';
      c.appendChild(table);
    }
    renderTable();
  })();
</script>

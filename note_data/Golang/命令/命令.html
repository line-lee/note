<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go命令参考</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Roboto,system-ui;background:#f8fafc;padding:32px;}
    .commands-section{max-width:1400px;margin:0 auto;}
    .commands-card{background:#fff;border-radius:28px;overflow-x:auto;border:1px solid #eef2f8;}
    .commands-title{font-size:1.45rem;font-weight:600;padding:20px 24px 12px;border-bottom:2px solid #eef2f8;display:flex;align-items:center;gap:12px;}
    .commands-title span{background:#e9f0f5;font-size:.75rem;padding:4px 12px;border-radius:40px;color:#006688;}
    table{width:100%;border-collapse:collapse;font-size:.88rem;}
    th{text-align:left;padding:14px 20px;background:#fafcff;font-weight:600;color:#1f4b5e;border-bottom:1px solid #e6edf4;}
    td{padding:12px 20px;border-bottom:1px solid #eff3f9;vertical-align:top;}
    .cmd-name{font-family:'Fira Code',monospace;font-weight:600;background:#fef6f9;border-radius:8px;padding:2px 8px;font-size:.82rem;display:inline-block;color:#c7254e;}
    code{background:#f1f5f9;padding:2px 6px;border-radius:8px;font-family:monospace;font-size:.8rem;}
  </style>
</head>
<body>
<div class="commands-section">
  <div class="commands-card">
    <div class="commands-title">📋 常用Go命令 <span>go command</span></div>
    <div id="commands-table"></div>
  </div>
</div>

<script>
  const commandsData = [
    {name:"go build", desc:"编译包和依赖", example:"go build ./cmd/app"},
    {name:"go install", desc:"编译并安装", example:"go install tool@latest"},
    {name:"go run", desc:"编译并运行", example:"go run main.go"},
    {name:"go test", desc:"运行测试", example:"go test -v ./..."},
    {name:"go get", desc:"添加依赖", example:"go get -u pkg"},
    {name:"go mod", desc:"模块维护", example:"go mod tidy"},
    {name:"go vet", desc:"静态检查", example:"go vet ./..."},
    {name:"go fmt", desc:"格式化", example:"go fmt ./..."},
    {name:"go generate", desc:"生成代码", example:"go generate ./..."},
    {name:"go clean", desc:"清理文件", example:"go clean -cache"},
    {name:"go env", desc:"环境信息", example:"go env GOROOT"},
    {name:"go list", desc:"列出包", example:"go list -m all"},
    {name:"go work", desc:"工作区管理", example:"go work init"},
    {name:"go tool", desc:"运行工具链", example:"go tool compile -help"}
  ];

  function renderCommands() {
    const container = document.getElementById('commands-table');
    if(!container) return;

    let html = '<table><thead><tr><th>命令</th><th>用途</th><th>示例</th></tr></thead><tbody>';
    for (const item of commandsData) {
      html += `<tr>
                <td><span class="cmd-name">${item.name}</span></td>
                <td>${item.desc}</td>
                <td><code>${item.example}</code></td>
            </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  renderCommands();
</script>
</body>
</html>

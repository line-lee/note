<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go特殊用途及实验变量</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Roboto,system-ui;background:#f8fafc;padding:32px;}
        .special-section{max-width:1400px;margin:0 auto;}
        .special-card{background:#fff;border-radius:28px;overflow-x:auto;border:1px solid #eef2f8;}
        .special-title{font-size:1.45rem;font-weight:600;padding:20px 24px 12px;border-bottom:2px solid #eef2f8;display:flex;align-items:center;gap:12px;}
        .special-title span{background:#e9f0f5;font-size:.75rem;padding:4px 12px;border-radius:40px;color:#006688;}
        table{width:100%;border-collapse:collapse;font-size:.88rem;}
        th{text-align:left;padding:14px 20px;background:#fafcff;font-weight:600;color:#1f4b5e;border-bottom:1px solid #e6edf4;}
        td{padding:12px 20px;border-bottom:1px solid #eff3f9;vertical-align:top;}
        .var-name{font-family:'Fira Code',monospace;font-weight:600;background:#fef6f9;border-radius:8px;padding:2px 8px;font-size:.82rem;display:inline-block;color:#c7254e;}
        .badge{background:#eef2fa;color:#2c5a74;border-radius:30px;padding:2px 8px;font-size:.7rem;margin-left:8px;display:inline-block;}
    </style>
</head>
<body>
<div class="special-section">
    <div class="special-card">
        <div class="special-title">⚙️ 特殊用途 & 实验变量 <span>高级配置</span></div>
        <div id="special-env-table"></div>
    </div>
</div>

<script>
    const specialData = [
        {name:"GOEXPERIMENT", desc:"工具链实验特性", readonly:false},
        {name:"GO_EXTLINK_ENABLED", desc:"外部链接模式", readonly:false},
        {name:"GIT_ALLOW_PROTOCOL", desc:"Git允许协议", readonly:false},
        {name:"GCCGOTOOLDIR", desc:"gccgo工具目录", readonly:false},
        {name:"GOTOOLDIR", desc:"工具链路径", readonly:true},
        {name:"GOVERSION", desc:"Go版本", readonly:true},
        {name:"GOMOD", desc:"go.mod路径，无模块时为NUL", readonly:true},
        {name:"GOEXE", desc:"可执行文件后缀", readonly:true},
        {name:"GOGCCFLAGS", desc:"CGO默认编译器参数", readonly:true},
        {name:"GOHOSTARCH", desc:"工具链架构", readonly:true},
        {name:"GOHOSTOS", desc:"工具链系统", readonly:true},
        {name:"GOTELEMETRYDIR", desc:"遥测数据存储目录", readonly:true},
        {name:"CGO_CFLAGS", desc:"CGO C编译额外flags", readonly:false},
        {name:"CGO_CPPFLAGS", desc:"CGO 预处理额外flags", readonly:false},
        {name:"CGO_CXXFLAGS", desc:"CGO C++编译额外flags", readonly:false},
        {name:"CGO_FFLAGS", desc:"CGO Fortran编译额外flags", readonly:false},
        {name:"CGO_LDFLAGS", desc:"CGO 链接额外flags", readonly:false}
    ];

    function renderSpecial() {
        const container = document.getElementById('special-env-table');
        if(!container) return;

        let html = '<table><thead><tr><th>变量名</th><th>说明</th></tr></thead><tbody>';
        for (const item of specialData) {
            const readonlyBadge = item.readonly ? '<span class="badge">只读</span>' : '';
            html += `<tr>
                <td><span class="var-name">${item.name}</span></td>
                <td>${item.desc} ${readonlyBadge}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    renderSpecial();
</script>
</body>
</html>

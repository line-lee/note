<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go架构特定环境变量</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Roboto,system-ui;background:#f8fafc;padding:32px;}
        .arch-section{max-width:1400px;margin:0 auto;}
        .arch-card{background:#fff;border-radius:28px;overflow-x:auto;border:1px solid #eef2f8;}
        .arch-title{font-size:1.45rem;font-weight:600;padding:20px 24px 12px;border-bottom:2px solid #eef2f8;display:flex;align-items:center;gap:12px;}
        .arch-title span{background:#e9f0f5;font-size:.75rem;padding:4px 12px;border-radius:40px;color:#006688;}
        table{width:100%;border-collapse:collapse;font-size:.88rem;}
        th{text-align:left;padding:14px 20px;background:#fafcff;font-weight:600;color:#1f4b5e;border-bottom:1px solid #e6edf4;}
        td{padding:12px 20px;border-bottom:1px solid #eff3f9;vertical-align:top;}
        .var-name{font-family:'Fira Code',monospace;font-weight:600;background:#fef6f9;border-radius:8px;padding:2px 8px;font-size:.82rem;display:inline-block;color:#c7254e;}
    </style>
</head>
<body>
<div class="arch-section">
    <div class="arch-card">
        <div class="arch-title">🖥️ 架构特定环境变量 <span>GOARM/GOAMD64</span></div>
        <div id="arch-env-table"></div>
    </div>
</div>

<script>
    const archData = [
        {name:"GOARM", desc:"ARM架构版本 (5/6/7)"},
        {name:"GOARM64", desc:"ARM64扩展特性"},
        {name:"GO386", desc:"386指令集级别 (387/sse2)"},
        {name:"GOAMD64", desc:"AMD64微架构级别 (v1/v2/v3/v4)"},
        {name:"GOMIPS", desc:"MIPS浮点模式 (hardfloat/softfloat)"},
        {name:"GOMIPS64", desc:"MIPS64浮点模式"},
        {name:"GOPPC64", desc:"PowerPC版本 (power8/power9)"},
        {name:"GORISCV64", desc:"RISC-V版本 (rv64gc)"},
        {name:"GOWASM", desc:"WASM实验特性 (satconv/signext)"}
    ];

    function renderArch() {
        const container = document.getElementById('arch-env-table');
        if(!container) return;

        let html = '<table><thead><tr><th>变量名</th><th>说明</th></tr></thead><tbody>';
        for (const item of archData) {
            html += `<tr>
                <td><span class="var-name">${item.name}</span></td>
                <td>${item.desc}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    renderArch();
</script>
</body>
</html>

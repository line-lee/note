<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go通用环境变量</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Roboto,system-ui;background:#f8fafc;padding:32px;}
        .env-section{max-width:1400px;margin:0 auto;}
        .env-card{background:#fff;border-radius:28px;overflow-x:auto;border:1px solid #eef2f8;}
        .env-title{font-size:1.45rem;font-weight:600;padding:20px 24px 12px;border-bottom:2px solid #eef2f8;display:flex;align-items:center;gap:12px;}
        .env-title span{background:#e9f0f5;font-size:.75rem;padding:4px 12px;border-radius:40px;color:#006688;}
        table{width:100%;border-collapse:collapse;font-size:.88rem;}
        th{text-align:left;padding:14px 20px;background:#fafcff;font-weight:600;color:#1f4b5e;border-bottom:1px solid #e6edf4;}
        td{padding:12px 20px;border-bottom:1px solid #eff3f9;vertical-align:top;}
        .var-name{font-family:'Fira Code',monospace;font-weight:600;background:#fef6f9;border-radius:8px;padding:2px 8px;font-size:.82rem;display:inline-block;color:#c7254e;}
        code{background:#f1f5f9;padding:2px 6px;border-radius:8px;font-family:monospace;font-size:.8rem;}
    </style>
</head>
<body>
<div class="env-section">
    <div class="env-card">
        <div class="env-title">📦 通用环境变量 <span>核心配置</span></div>
        <div id="general-env-table"></div>
    </div>
</div>

<script>
    const envData = [
        {name:"GO111MODULE", desc:"控制模块感知模式: off, on, auto"},
        {name:"GCCGO", desc:"gccgo命令路径"},
        {name:"GOARCH", desc:"目标架构"},
        {name:"GOBIN", desc:"go install安装目录"},
        {name:"GOCACHE", desc:"构建缓存目录"},
        {name:"GOMODCACHE", desc:"模块下载缓存目录"},
        {name:"GODEBUG", desc:"控制运行时调试输出，如 gctrace=1, inittrace=1"},
        {name:"GOENV", desc:"Go环境配置文件位置"},
        {name:"GOFLAGS", desc:"默认flag列表"},
        {name:"GOINSECURE", desc:"允许不安全HTTP获取的模块前缀"},
        {name:"GOOS", desc:"目标操作系统"},
        {name:"GOPATH", desc:"工作区根目录（已被Go Modules取代）"},
        {name:"GOPROXY", desc:"模块代理URL"},
        {name:"GOPRIVATE", desc:"私有模块glob模式"},
        {name:"GONOPROXY", desc:"不走代理的模块"},
        {name:"GONOSUMDB", desc:"不走校验和的模块"},
        {name:"GOROOT", desc:"Go安装根目录"},
        {name:"GOSUMDB", desc:"校验和数据库"},
        {name:"GOTOOLCHAIN", desc:"工具链版本控制"},
        {name:"GOTMPDIR", desc:"临时文件目录"},
        {name:"GOVCS", desc:"限制版本控制系统"},
        {name:"GOWORK", desc:"工作区文件路径"},
        {name:"GOTELEMETRY", desc:"遥测数据收集模式: local, on, off"},
        {name:"CGO_ENABLED", desc:"是否启用CGO，1=启用，0=禁用"},
        {name:"CC", desc:"C编译器路径，CGO依赖"},
        {name:"CXX", desc:"C++编译器路径"},
        {name:"AR", desc:"归档工具(ar)路径"},
        {name:"PKG_CONFIG", desc:"pkg-config工具路径"}
    ];

    function renderEnv() {
        const container = document.getElementById('general-env-table');
        if(!container) return;

        let html = '<table><thead><tr><th>变量名</th><th>描述/用途</th></tr></thead><tbody>';
        for (const item of envData) {
            html += `<tr>
                <td><span class="var-name">${item.name}</span></td>
                <td>${item.desc}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    renderEnv();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 笔记系统 - 只读版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 320px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #24292e 0%, #1a1e22 100%);
            color: white;
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .toolbar {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            background: #2ea44f;
            color: white;
        }

        .btn:hover {
            background: #2c974b;
        }

        .nav-tree {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .folder-item {
            margin: 2px 0;
        }

        .folder-header {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .folder-header:hover {
            background: #f0f0f0;
        }

        .nav-file {
            display: flex;
            align-items: center;
            padding: 6px 8px 6px 28px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .nav-file:hover {
            background: #f0f0f0;
        }

        .nav-file.active {
            background: #e3f2fd;
            color: #1976d2;
        }

        /* 右侧内容区 */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafafa;
            overflow-y: auto;
        }

        .content-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .current-doc-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #24292e;
        }

        .doc-path {
            font-size: 0.75rem;
            color: #666;
            margin-top: 4px;
        }

        .document-viewer {
            flex: 1;
            padding: 0;
            margin: 0;
            background: transparent;
            overflow-y: auto;
        }

        /* 笔记内容容器 - 独立作用域，保留子HTML原始样式 */
        .note-content {
            max-width: 1000px;
            margin: 24px auto;
            background: transparent;
        }

        /* 确保子HTML的样式不会被覆盖，同时不污染主页面 */
        .note-content :where(h1, h2, h3, h4, p, pre, code, table, blockquote, div, span) {
            all: revert;
        }

        .loading-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2ea44f;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #dc3545;
        }

        .status {
            padding: 8px 12px;
            font-size: 0.75rem;
            color: #666;
            border-top: 1px solid #e0e0e0;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>📓 GitHub 笔记系统</h2>
            <div style="font-size: 0.75rem;">只读模式 · 保留原样式</div>
        </div>
        <div class="toolbar">
            <button class="btn" onclick="refreshNotes()">🔄 刷新笔记</button>
        </div>
        <div class="nav-tree" id="navTree">
            <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
        </div>
        <div class="status" id="status">就绪</div>
    </div>

    <div class="content-area">
        <div class="content-header">
            <div class="current-doc-title" id="currentTitle">📄 未选择笔记</div>
            <div class="doc-path" id="currentPath"></div>
        </div>
        <div id="documentViewer" class="document-viewer">
            <div class="loading-placeholder">
                <div class="spinner"></div>
                <div>请从左侧选择一个笔记</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== GitHub 配置 ==========
    const GITHUB_TOKEN = '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';
    const REPO_OWNER = 'line-lee';
    const REPO_NAME = 'note';
    const NOTES_PATH = 'note_data';

    let currentNote = null;
    let allNotes = [];

    function setStatus(msg, isError = false) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = msg;
        statusDiv.style.color = isError ? '#dc3545' : '#2ea44f';
        setTimeout(() => {
            if (statusDiv.textContent === msg) {
                statusDiv.style.color = '#666';
            }
        }, 3000);
    }

    // 获取所有笔记
    async function fetchNotes() {
        try {
            setStatus('正在加载笔记列表...');
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${NOTES_PATH}`, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) throw new Error('获取失败');
            const data = await response.json();
            allNotes = await processTree(data, NOTES_PATH);
            renderTree(allNotes);
            setStatus(`加载完成，共 ${countFiles(allNotes)} 个笔记`);
            return allNotes;
        } catch (err) {
            setStatus('错误: ' + err.message, true);
            return [];
        }
    }

    // 统计文件数量
    function countFiles(items) {
        let count = 0;
        for (const item of items) {
            if (item.type === 'file') {
                count++;
            } else if (item.children) {
                count += countFiles(item.children);
            }
        }
        return count;
    }

    // 递归处理目录树
    async function processTree(items, currentPath) {
        const result = [];

        for (const item of items) {
            if (item.type === 'dir') {
                const dirResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${item.path}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const dirItems = await dirResponse.json();
                const children = await processTree(dirItems, item.path);
                result.push({
                    type: 'dir',
                    name: item.name,
                    path: item.path,
                    children: children
                });
            } else if (item.name.endsWith('.html')) {
                result.push({
                    type: 'file',
                    name: item.name,
                    path: item.path,
                    title: item.name.replace('.html', '').replace(/[-_]/g, ' '),
                    sha: item.sha
                });
            }
        }
        return result;
    }

    // 渲染树形导航
    function renderTree(items, container = null, level = 0) {
        const navTree = document.getElementById('navTree');
        if (container === null) {
            navTree.innerHTML = '';
            container = navTree;
        }

        for (const item of items) {
            if (item.type === 'dir') {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder-item';

                const header = document.createElement('div');
                header.className = 'folder-header';
                header.style.paddingLeft = `${8 + level * 16}px`;
                header.innerHTML = `
                    <span>📁 ${item.name}</span>
                    <span style="margin-left: auto;">▼</span>
                `;

                const childrenDiv = document.createElement('div');
                childrenDiv.style.marginLeft = '16px';
                childrenDiv.style.display = 'block';

                let collapsed = false;
                header.onclick = () => {
                    collapsed = !collapsed;
                    childrenDiv.style.display = collapsed ? 'none' : 'block';
                    header.querySelector('span:last-child').textContent = collapsed ? '▶' : '▼';
                };

                renderTree(item.children, childrenDiv, level + 1);
                folderDiv.appendChild(header);
                folderDiv.appendChild(childrenDiv);
                container.appendChild(folderDiv);
            } else {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'nav-file';
                fileDiv.style.paddingLeft = `${24 + level * 16}px`;
                fileDiv.innerHTML = `<span>📄 ${item.title}</span>`;
                fileDiv.onclick = () => {
                    document.querySelectorAll('.nav-file').forEach(el => el.classList.remove('active'));
                    fileDiv.classList.add('active');
                    loadNoteContent(item);
                };
                container.appendChild(fileDiv);
            }
        }
    }

    // 加载并显示笔记内容（保留子HTML所有样式）
    async function loadNoteContent(note) {
        currentNote = note;
        document.getElementById('currentTitle').textContent = `📄 ${note.title}`;
        document.getElementById('currentPath').textContent = `路径: ${note.path}`;

        const viewer = document.getElementById('documentViewer');
        viewer.innerHTML = '<div class="loading-placeholder"><div class="spinner"></div><div>加载中...</div></div>';

        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${note.path}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const data = await response.json();

            // 修复中文乱码：正确的 UTF-8 解码
            let content = decodeURIComponent(escape(atob(data.content)));

            // 提取 body 内的内容，保留完整 HTML 结构
            const bodyMatch = content.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
            if (bodyMatch) {
                content = bodyMatch[1];
            }

            // 提取样式（如果有 head 中的 style）
            const styleMatch = content.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
            let styles = '';
            if (styleMatch) {
                styles = styleMatch.join('\n');
                // 从内容中移除 style 标签（避免重复）
                content = content.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
            }

            // 修复相对路径资源（图片、链接等）
            const baseDir = note.path.substring(0, note.path.lastIndexOf('/') + 1);
            content = content.replace(/(src|href)=["'](?!https?:\/\/|data:|\/|#)([^"']+)["']/gi, (match, attr, url) => {
                return `${attr}="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${baseDir}${url}"`;
            });

            // 创建内容容器，保留子HTML样式，同时防止样式泄露到主页面
            viewer.innerHTML = `
                <div class="note-content">
                    ${styles ? `<style>${styles}</style>` : ''}
                    ${content}
                </div>
            `;

            setStatus(`已加载: ${note.name}`);
        } catch (err) {
            viewer.innerHTML = `<div class="error-placeholder">❌ 加载失败: ${err.message}</div>`;
            setStatus('加载失败: ' + err.message, true);
        }
    }

    async function refreshNotes() {
        await fetchNotes();
        // 如果有笔记且没有选中的，自动选中第一个
        if (allNotes.length > 0 && !currentNote) {
            const firstFile = findFirstFile(allNotes);
            if (firstFile) {
                loadNoteContent(firstFile);
                // 高亮第一个文件
                setTimeout(() => {
                    const firstNavFile = document.querySelector('.nav-file');
                    if (firstNavFile) firstNavFile.classList.add('active');
                }, 100);
            }
        }
    }

    // 查找第一个文件
    function findFirstFile(items) {
        for (const item of items) {
            if (item.type === 'file') {
                return item;
            }
            if (item.children) {
                const found = findFirstFile(item.children);
                if (found) return found;
            }
        }
        return null;
    }

    // 初始化
    refreshNotes();
</script>
</body>
</html>

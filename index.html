<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 笔记系统 - 云端笔记库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 320px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #24292e 0%, #1a1e22 100%);
            color: white;
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .toolbar {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2ea44f;
            color: white;
        }

        .btn-primary:hover {
            background: #2c974b;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .nav-tree {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .folder-item {
            margin: 2px 0;
        }

        .folder-header {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .folder-header:hover {
            background: #f0f0f0;
        }

        .nav-file {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px 6px 28px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .nav-file:hover {
            background: #f0f0f0;
        }

        .nav-file.active {
            background: #e3f2fd;
            color: #1976d2;
        }

        .file-actions {
            display: none;
            gap: 4px;
        }

        .nav-file:hover .file-actions {
            display: flex;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .icon-btn:hover {
            background: rgba(0,0,0,0.1);
        }

        /* 右侧编辑区 */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        .editor-toolbar {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .note-title-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
        }

        .editor-container {
            flex: 1;
            padding: 20px;
        }

        .editor {
            width: 100%;
            height: 100%;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            resize: none;
            background: white;
        }

        .preview {
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 400px;
        }

        .modal input, .modal select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }

        .status {
            padding: 4px 12px;
            font-size: 0.75rem;
            color: #666;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>📓 GitHub 笔记系统</h2>
            <div style="font-size: 0.75rem;">云端存储 · 实时同步</div>
        </div>
        <div class="toolbar">
            <button class="btn btn-primary" onclick="showCreateModal()">➕ 新建笔记</button>
            <button class="btn" onclick="refreshNotes()">🔄 刷新</button>
        </div>
        <div class="nav-tree" id="navTree">
            <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
        </div>
        <div class="status" id="status">就绪</div>
    </div>

    <div class="content-area">
        <div class="editor-toolbar">
            <input type="text" id="noteTitle" class="note-title-input" placeholder="笔记标题">
            <button class="btn btn-primary" onclick="saveNote()">💾 保存</button>
            <button class="btn btn-danger" onclick="deleteCurrentNote()">🗑️ 删除</button>
            <button class="btn" onclick="toggleMode()">👁️ 预览/编辑</button>
        </div>
        <div class="editor-container">
            <textarea id="editor" class="editor" style="display: none;"></textarea>
            <div id="preview" class="preview"></div>
        </div>
    </div>
</div>

<div id="createModal" class="modal hidden">
    <div class="modal-content">
        <h3>新建笔记</h3>
        <input type="text" id="newNoteTitle" placeholder="笔记标题" autocomplete="off">
        <select id="newNoteFolder">
            <option value="">根目录</option>
        </select>
        <div style="margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end;">
            <button class="btn" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="createNote()">创建</button>
        </div>
    </div>
</div>

<script>
    // ========== GitHub 配置 ==========
    const GITHUB_TOKEN = 'YOUR_GITHUB_TOKEN';  // 替换为您的 GitHub Token
    const REPO_OWNER = 'YOUR_USERNAME';        // 替换为您的 GitHub 用户名
    const REPO_NAME = 'YOUR_REPO_NAME';        // 替换为您的仓库名
    const NOTES_PATH = 'note_data';            // 笔记文件夹路径
    
    let currentNote = null;
    let allNotes = [];
    let editMode = true;
    
    // 显示状态
    function setStatus(msg, isError = false) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = msg;
        statusDiv.style.color = isError ? '#dc3545' : '#2ea44f';
        setTimeout(() => {
            if (statusDiv.textContent === msg) {
                statusDiv.style.color = '#666';
            }
        }, 3000);
    }
    
    // 获取所有笔记
    async function fetchNotes() {
        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${NOTES_PATH}`, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!response.ok) throw new Error('获取失败');
            const data = await response.json();
            allNotes = await processTree(data, NOTES_PATH);
            renderTree(allNotes);
            return allNotes;
        } catch (err) {
            setStatus('错误: ' + err.message, true);
            return [];
        }
    }
    
    // 递归处理目录树
    async function processTree(items, currentPath) {
        const result = [];
        
        for (const item of items) {
            if (item.type === 'dir') {
                const dirResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${item.path}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const dirItems = await dirResponse.json();
                const children = await processTree(dirItems, item.path);
                result.push({
                    type: 'dir',
                    name: item.name,
                    path: item.path,
                    children: children
                });
            } else if (item.name.endsWith('.html')) {
                result.push({
                    type: 'file',
                    name: item.name,
                    path: item.path,
                    title: item.name.replace('.html', ''),
                    sha: item.sha
                });
            }
        }
        
        return result;
    }
    
    // 渲染树形导航
    function renderTree(items, container = null, level = 0) {
        const navTree = document.getElementById('navTree');
        if (container === null) {
            navTree.innerHTML = '';
            container = navTree;
        }
        
        for (const item of items) {
            if (item.type === 'dir') {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder-item';
                
                const header = document.createElement('div');
                header.className = 'folder-header';
                header.style.paddingLeft = `${8 + level * 16}px`;
                header.innerHTML = `
                    <span>📁 ${item.name}</span>
                    <span style="margin-left: auto;">▼</span>
                `;
                
                const childrenDiv = document.createElement('div');
                childrenDiv.className = 'folder-children';
                childrenDiv.style.marginLeft = '16px';
                childrenDiv.style.display = 'block';
                
                let collapsed = false;
                header.onclick = () => {
                    collapsed = !collapsed;
                    childrenDiv.style.display = collapsed ? 'none' : 'block';
                    header.querySelector('span:last-child').textContent = collapsed ? '▶' : '▼';
                };
                
                renderTree(item.children, childrenDiv, level + 1);
                folderDiv.appendChild(header);
                folderDiv.appendChild(childrenDiv);
                container.appendChild(folderDiv);
            } else {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'nav-file';
                fileDiv.style.paddingLeft = `${24 + level * 16}px`;
                fileDiv.innerHTML = `
                    <span>📄 ${item.title}</span>
                    <div class="file-actions">
                        <button class="icon-btn" onclick="event.stopPropagation(); deleteNote('${item.path}', '${item.sha}')">🗑️</button>
                    </div>
                `;
                fileDiv.onclick = () => {
                    document.querySelectorAll('.nav-file').forEach(el => el.classList.remove('active'));
                    fileDiv.classList.add('active');
                    loadNoteContent(item);
                };
                container.appendChild(fileDiv);
            }
        }
    }
    
    // 加载笔记内容
    async function loadNoteContent(note) {
        currentNote = note;
        document.getElementById('noteTitle').value = note.title;
        
        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${note.path}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const data = await response.json();
            const content = atob(data.content);
            document.getElementById('editor').value = content;
            document.getElementById('preview').innerHTML = content;
            setStatus('已加载: ' + note.name);
        } catch (err) {
            setStatus('加载失败: ' + err.message, true);
        }
    }
    
    // 保存笔记
    async function saveNote() {
        if (!currentNote) {
            setStatus('请先选择一个笔记', true);
            return;
        }
        
        const content = document.getElementById('editor').value;
        const newTitle = document.getElementById('noteTitle').value;
        const newPath = currentNote.path.replace(currentNote.name, newTitle + '.html');
        
        try {
            // 获取当前文件的 SHA
            let sha = currentNote.sha;
            if (!sha) {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${currentNote.path}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const data = await response.json();
                sha = data.sha;
            }
            
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${currentNote.path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `更新笔记: ${currentNote.name}`,
                    content: btoa(unescape(encodeURIComponent(content))),
                    sha: sha
                })
            });
            
            if (response.ok) {
                setStatus('保存成功！');
                refreshNotes();
            } else {
                throw new Error('保存失败');
            }
        } catch (err) {
            setStatus('保存失败: ' + err.message, true);
        }
    }
    
    // 删除笔记
    async function deleteNote(path, sha) {
        if (!confirm('确定要删除这个笔记吗？')) return;
        
        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `删除笔记: ${path}`,
                    sha: sha
                })
            });
            
            if (response.ok) {
                setStatus('删除成功');
                refreshNotes();
                if (currentNote && currentNote.path === path) {
                    currentNote = null;
                    document.getElementById('editor').value = '';
                    document.getElementById('preview').innerHTML = '';
                    document.getElementById('noteTitle').value = '';
                }
            } else {
                throw new Error('删除失败');
            }
        } catch (err) {
            setStatus('删除失败: ' + err.message, true);
        }
    }
    
    function deleteCurrentNote() {
        if (currentNote) {
            deleteNote(currentNote.path, currentNote.sha);
        }
    }
    
    function showCreateModal() {
        document.getElementById('createModal').classList.remove('hidden');
        // 填充文件夹选项
        const folderSelect = document.getElementById('newNoteFolder');
        folderSelect.innerHTML = '<option value="">根目录</option>';
        
        function addFolderOptions(items, prefix = '') {
            for (const item of items) {
                if (item.type === 'dir') {
                    const option = document.createElement('option');
                    option.value = item.path;
                    option.textContent = prefix + item.name;
                    folderSelect.appendChild(option);
                    if (item.children) {
                        addFolderOptions(item.children, prefix + item.name + '/');
                    }
                }
            }
        }
        addFolderOptions(allNotes);
    }
    
    function closeModal() {
        document.getElementById('createModal').classList.add('hidden');
        document.getElementById('newNoteTitle').value = '';
    }
    
    async function createNote() {
        const title = document.getElementById('newNoteTitle').value;
        const folder = document.getElementById('newNoteFolder').value;
        
        if (!title) {
            setStatus('请输入笔记标题', true);
            return;
        }
        
        const filePath = folder ? `${folder}/${title}.html` : `${NOTES_PATH}/${title}.html`;
        const content = `<h1>${title}</h1>\n<p>在这里编写您的笔记...</p>`;
        
        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `创建笔记: ${title}`,
                    content: btoa(unescape(encodeURIComponent(content)))
                })
            });
            
            if (response.ok) {
                setStatus('创建成功！');
                closeModal();
                refreshNotes();
            } else {
                throw new Error('创建失败');
            }
        } catch (err) {
            setStatus('创建失败: ' + err.message, true);
        }
    }
    
    function toggleMode() {
        editMode = !editMode;
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        
        if (editMode) {
            editor.style.display = 'block';
            preview.style.display = 'none';
        } else {
            editor.style.display = 'none';
            preview.style.display = 'block';
            // 更新预览
            preview.innerHTML = document.getElementById('editor').value;
        }
    }
    
    async function refreshNotes() {
        await fetchNotes();
    }
    
    // 监听编辑器变化，实时更新预览
    document.getElementById('editor').addEventListener('input', function() {
        if (!editMode) {
            document.getElementById('preview').innerHTML = this.value;
        }
    });
    
    // 初始化
    refreshNotes();
</script>
</body>
</html>
